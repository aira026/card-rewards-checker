<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷卡參謀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;600;700&family=DM+Mono:wght=400;500&display=swap');
:root {
  --bg:#f2f1ee;--surface:#fff;--surface2:#f7f6f3;--border:#e3e1db;--border2:#ccc9c1;
  --text:#18170f;--muted:#888279;--light:#b8b4ab;
  --blue:#2050d0;--blue-bg:#eef2fd;--blue-light:#dce6fc;
  --green:#167040;--green-bg:#e6f4ec;
  --amber:#a07010;--amber-bg:#fdf5e0;
  --red:#b83030;--red-bg:#fde8e8;
  --radius:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.65;min-height:100vh}
a{color:var(--blue);text-decoration:none}

/* ── HEADER ── */
.hd{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:200}
.hd-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:10px;height:48px}
.hd-logo{width:30px;height:30px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hd-logo span{color:#fff;font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.hd-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.hd-nav{display:flex;gap:2px;margin-left:auto}
.nav-btn{padding:5px 10px;border:none;background:none;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;border-radius:5px;font-weight:500;transition:all .1s}
.nav-btn.active,.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{font-weight:700;color:var(--text)}

/* ── LAYOUT ── */
.wrap{max-width:680px;margin:0 auto;padding:16px}
.page{display:none}.page.active{display:block}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}

/* ── LEVEL SELECTOR ── */
.lv-row{display:flex;gap:7px;margin-bottom:14px}
.lv-btn{flex:1;padding:9px 6px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--r-sm);cursor:pointer;text-align:center;transition:all .1s;font-family:inherit;line-height:1.25}
.lv-btn:hover{border-color:var(--border2)}
.lv-btn.active{border-color:var(--blue);background:var(--blue-bg)}
.lv-n{display:block;font-size:17px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.lv-btn.active .lv-n{color:var(--blue)}
.lv-d{font-size:11px;color:var(--muted)}

/* ── QUERY CARD ── */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.q-row{display:flex;gap:8px;margin-bottom:9px}
input[type=text],input[type=number],select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 11px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--blue);background:#fff}
input::placeholder,textarea::placeholder{color:var(--light)}
input[type=number]{font-family:'DM Mono',monospace}
.q-store{flex:1;min-width:0}
.q-btn{padding:9px 16px;background:var(--text);color:#fff;border:none;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .1s,transform .08s;flex-shrink:0}
.q-btn:hover{background:#2a2a2a}
.q-btn:active{transform:scale(.97)}
.q-row2{display:flex;gap:8px}
.amt-wrap{position:relative;flex:1;min-width:0}
.amt-pfx{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-family:'DM Mono',monospace;pointer-events:none;font-size:13px}
.amt-wrap input{padding-left:22px;width:100%}
.sel-wrap{position:relative;flex:0 0 148px}
.sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:11px}
select{padding-right:26px;width:100%;cursor:pointer}

/* ── QUICK TAGS ── */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin:9px 0 0}
.tag{padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:16px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .1s;font-weight:500}
.tag:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.toggle-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface);font-size:12px;color:var(--muted)}
.feature-notes{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.feature-notes .announce-item{font-size:12px}

/* ── ANNOUNCEMENT BAR ── */
.announce{background:var(--amber-bg);border:1px solid #e8c060;border-radius:var(--r-sm);padding:8px 12px;margin-bottom:12px;font-size:12px;line-height:1.6}
.announce-hd{font-weight:700;color:var(--amber);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.announce-item{color:var(--text);padding:2px 0}
.announce-item::before{content:'· '}

/* ── RESULT CARDS ── */
.r-header{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.r-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.r-query{font-size:13px;font-weight:600}
.r-scene{font-size:12px;color:var(--muted)}

.rc{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px}
.rc.best{border-color:var(--blue)}
.rc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.rc-badge{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;letter-spacing:-.02em;line-height:1.1;text-align:center}
.b-ts{background:#e6eefe;color:#1a3fb0}
.b-ct{background:#fef4d8;color:#7a5500}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:13px;font-weight:700;line-height:1.3}
.rc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.rc-best-tag{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;align-self:flex-start}

.rc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.stat{background:var(--surface2);border-radius:7px;padding:8px 10px;text-align:center}
.sv{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.2}
.sv.blue{color:var(--blue)}
.sv.green{color:var(--green)}
.sl{font-size:11px;color:var(--muted);margin-top:1px}

.rc-notes{margin-top:9px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:3px 10px;font-size:12px;color:var(--muted)}
.rc-notes span::before{content:'· '}
.rc-plan{margin-top:7px;padding:7px 10px;background:var(--blue-bg);border-radius:6px;font-size:12px;color:var(--blue);font-weight:500}
.rc-plan strong{font-weight:700}
.cap-warn{margin-top:6px;display:inline-block;padding:4px 9px;background:var(--amber-bg);border:1px solid #e8c060;border-radius:4px;font-size:11px;color:var(--amber)}
.no-r{text-align:center;padding:30px 0;color:var(--muted);font-size:13px}
.cat-badge{display:inline-block;padding:2px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--muted);margin-bottom:8px}

/* ── SPLIT COMPARE ── */
.split-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.split-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.split-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.split-row label{font-size:12px;color:var(--muted);flex:0 0 70px}
.split-row input{flex:1}
.split-result{margin-top:8px;font-size:13px;padding:8px 10px;background:var(--surface2);border-radius:6px;line-height:1.7}

/* ── MY STATUS ── */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.st-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.st-hd{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.st-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.2}
.st-sub{font-size:11px;color:var(--muted);margin-top:3px}
.prog{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s}
.prog-fill.warn{background:var(--amber)}
.prog-fill.full{background:var(--green)}
.status-edit{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.stat-input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.stat-input-row label{font-size:12px;color:var(--muted);flex:0 0 100px}
.stat-input-row input{flex:1}
.reminders{margin-top:10px}
.rem-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;font-size:12px}
.rem-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-blue{background:var(--blue)}
.dot-amber{background:var(--amber)}
.dot-green{background:var(--green)}

/* ── CARD MANAGER ── */
.cm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.cm-head{padding:12px 14px;display:flex;align-items:center;gap:10px}
.cm-info{flex:1}
.cm-name{font-size:13px;font-weight:700}
.cm-sub{font-size:11px;color:var(--muted)}
.cm-toggle{padding:4px 10px;border:1.5px solid var(--border);border-radius:16px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;background:none;transition:all .1s}
.cm-toggle.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.cm-toggle.off{border-color:var(--border2);color:var(--muted)}
.cm-body{padding:0 14px 12px;border-top:1px solid var(--border)}
.cm-plan-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.cm-plan-row:last-child{border-bottom:none}
.cm-plan-name{flex:0 0 80px;font-weight:600}
.cm-plan-stores{flex:1;color:var(--muted);font-size:11px;line-height:1.5}
.cm-plan-rate{font-family:'DM Mono',monospace;font-weight:700;color:var(--blue);flex-shrink:0}

/* ── DATA IO ── */
.io-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.io-title{font-size:13px;font-weight:700;margin-bottom:10px}
.io-row{display:flex;gap:8px;margin-bottom:8px}
.btn-sm{padding:7px 14px;border-radius:var(--r-sm);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .1s;border:1.5px solid var(--border)}
.btn-sm.pri{background:var(--text);color:#fff;border-color:var(--text)}
.btn-sm.sec{background:var(--surface);color:var(--text)}
.btn-sm:hover{opacity:.85}
.btn-sm.danger{border-color:var(--red);color:var(--red)}
textarea.json-area{width:100%;height:180px;font-family:'DM Mono',monospace;font-size:11px;resize:vertical;border-radius:var(--r-sm)}

/* ── RULE OVERVIEW ── */
.rule-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.rule-table th{background:var(--surface2);padding:7px 10px;text-align:left;font-weight:600;border-bottom:1.5px solid var(--border);color:var(--muted);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.rule-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.rule-table tr:last-child td{border-bottom:none}
.rule-table td:nth-child(3),.rule-table td:nth-child(4){font-family:'DM Mono',monospace;font-weight:600;color:var(--blue)}
.rule-table .sub{font-size:10px;color:var(--muted);display:block;margin-top:2px}
.rule-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.rule-box-hd{padding:10px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2)}

/* ── DIVIDER ── */
hr.divider{border:none;border-top:1px solid var(--border);margin:8px 0 12px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .rc-stats{grid-template-columns:1fr 1fr 1fr}
  .stat:last-child{grid-column:span 2}
  .status-grid{grid-template-columns:1fr}
  .sel-wrap{flex:0 0 120px}
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-inner">
    <div class="hd-logo"><span>刷</span></div>
    <div class="hd-title">刷卡參謀</div>
    <nav class="hd-nav">
      <button class="nav-btn active" onclick="goPage('q')">查詢</button>
            <button class="nav-btn" onclick="goPage('rules')">規則</button>
      <button class="nav-btn" onclick="goPage('manage')">管理</button>
    </nav>
  </div>
</div>

<div class="wrap page active" id="pg-q">

  <div class="announce" id="announceBar"></div>

  <div class="sec-lbl">我的等級</div>
  <div class="lv-row" id="lvRow"></div>

  <div class="q-card">
    <div class="q-row">
      <input type="text" class="q-store" id="storeInput" placeholder="輸入店家名稱或消費類型" autocomplete="off" oninput="handleStoreInput()" onkeydown="if(event.key==='Enter')doQuery()">
      <button class="q-btn" onclick="doQuery()">立即查詢</button>
    </div>
    <div class="tags" id="quickTags"></div>
    <hr class="divider">
    <div class="q-row2">
      <div class="sel-wrap" style="flex:0 0 128px">
        <select id="regionSel">
          <option value="domestic">國內</option>
          <option value="japan">日本</option>
          <option value="west">歐美 / 其他海外</option>
        </select>
      </div>
      <label style="display:flex;align-items:center;gap:6px;padding:0 4px;white-space:nowrap;color:var(--muted);font-size:12px"><input type="checkbox" id="birthdayToggle"> 生日月</label>
      <div class="amt-wrap">
        <span class="amt-pfx">$</span>
        <input type="number" id="amountInput" placeholder="輸入消費金額" min="0" step="100" oninput="refreshResults()">
      </div>
      <div class="sel-wrap">
        <select id="sceneSelect" onchange="refreshResults()">
          <option value="applepay">Apple Pay</option>
          <option value="linepay">LINE Pay</option>
          <option value="taishinpay">台新Pay</option>
          <option value="pxpay">全支付</option>
          <option value="taiwanpay">台灣Pay</option>
        </select>
      </div>
    </div>
  </div>

  <div class="split-box" id="splitBox" style="display:none">
    <div class="split-title">拆單比較</div>
    <div class="split-row"><label>卡A金額</label><input type="number" id="splitA" placeholder="0" oninput="calcSplit()"></div>
    <div class="split-row"><label>卡B金額</label><input type="number" id="splitB" placeholder="0" oninput="calcSplit()"></div>
    <div class="split-result" id="splitResult"></div>
  </div>

    <div id="results"></div>
</div>

<div class="wrap page" id="pg-rules">
  <div id="rulesContent"></div>
</div>

<div class="wrap page" id="pg-manage">
  <div class="sec-lbl" style="margin-bottom:10px">我的卡片</div>
  <div id="cardManagerList"></div>

  <div class="io-box" style="margin-top:16px">
    <div class="io-title">資料匯出 / 匯入</div>
    <div class="io-row">
      <button class="btn-sm pri" onclick="exportData()">匯出 JSON</button>
      <button class="btn-sm sec" onclick="document.getElementById('importFile').click()">匯入 JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn-sm danger" onclick="resetData()">重置</button>
    </div>
    <textarea class="json-area" id="exportArea" placeholder="匯出後 JSON 會顯示在此..."></textarea>
  </div>
</div>

// ── Store → plan detection ──
function detectPlan(input, cardId){
  const card = DATA.cards.find(c=>c.id===cardId);
  if(!card) return null;
  const lower = input.toLowerCase();
  for(const plan of card.plans){
    for(const kw of plan.keywords){
      if(lower.includes(kw.toLowerCase())) return plan;
    }
  }
  return null;
}

// ── Compute best rate for a card ──
function computeCardResult(card, input, scene, lv){
  let bestPlan = null;
  let bestRate = card.baseRate;
  const lower = input.toLowerCase();

  for(const plan of card.plans){
    // scene-triggered plans
    if(plan.sceneTrigger && plan.sceneTrigger !== scene) continue;

    for(const kw of plan.keywords){
      if(lower.includes(kw.toLowerCase())){
        const r = plan.levels[lv].rate;
        if(r > bestRate){ bestRate = r; bestPlan = plan; }
        break;
      }
    }
  }

  // Special: weekend scene unlocks 假日刷 for any store
  if(scene==='weekend'){
    const wPlan = card.plans.find(p=>p.id==='holiday'||p.sceneTrigger==='weekend');
    if(wPlan){
      const r = wPlan.levels[lv].rate;
      if(r > bestRate){ bestRate = r; bestPlan = wPlan; }
    }
  }

  const lvData = bestPlan ? bestPlan.levels[lv] : null;
  return { card, plan: bestPlan, rate: bestRate, lvData };
}

// ── Main query ──
function doQuery(){
  const v = document.getElementById('storeInput').value.trim();
  if(!v){ document.getElementById('results').innerHTML=''; return; }
  lastQuery = v;
  refreshResults();
}

function refreshResults(){
  if(!lastQuery) return;
  const lv = DATA.myLevel;
  const amount = parseFloat(document.getElementById('amountInput').value)||0;
  const scene = document.getElementById('sceneSelect').value;

  const activeCards = DATA.cards.filter(c=>c.enabled);
  if(!activeCards.length){
    document.getElementById('results').innerHTML='<div class="no-r">沒有啟用的卡片。請到「管理」頁面新增或啟用卡片。</div>';
    return;
  }

  const results = activeCards.map(card=>{
    const cr = computeCardResult(card, lastQuery, scene, lv);
    const cashback = amount>0 ? amount * cr.rate : null;
    return {...cr, cashback};
  }).sort((a,b)=>(b.cashback??b.rate)-(a.cashback??a.rate));

  const sceneLabels = {
    applepay:'Apple Pay', linepay:'LINE Pay', taishinpay:'台新Pay', pxpay:'全支付', taiwanpay:'台灣Pay'
  };

  let html = `<div class="r-header">
    <span class="r-title">查詢結果</span>
    <span class="r-query">${escHtml(lastQuery)}</span>
    <span class="r-scene">· ${sceneLabels[scene]} · Lv.${lv}</span>
  </div>`;

  results.forEach((r,idx)=>{
    html += renderRC(r, idx===0, amount, lv);
  });

  // Split compare button
  if(results.length>=2 && amount>0){
    document.getElementById('splitBox').style.display='block';
    initSplit(results);
  } else {
    document.getElementById('splitBox').style.display='none';
  }

  document.getElementById('results').innerHTML = html;
}

let splitCards = [];
function initSplit(results){
  splitCards = results;
  document.getElementById('splitA').value = '';
  document.getElementById('splitB').value = '';
  document.getElementById('splitResult').innerHTML = '輸入兩張卡各自要刷的金額，自動加總比較回饋。';
}

function calcSplit(){
  if(splitCards.length<2) return;
  const a = parseFloat(document.getElementById('splitA').value)||0;
  const b = parseFloat(document.getElementById('splitB').value)||0;
  const ca = a * splitCards[0].rate;
  const cb = b * splitCards[1].rate;
  document.getElementById('splitResult').innerHTML =
    `<strong>${splitCards[0].card.name}</strong> $${fmt(a)} → 回饋 <span style="color:var(--green);font-family:'DM Mono',monospace;font-weight:700">+$${fmt(ca)}</span><br>`+
    `<strong>${splitCards[1].card.name}</strong> $${fmt(b)} → 回饋 <span style="color:var(--green);font-family:'DM Mono',monospace;font-weight:700">+$${fmt(cb)}</span><br>`+
    `合計回饋：<span style="color:var(--blue);font-family:'DM Mono',monospace;font-weight:700">$${fmt(ca+cb)}</span>`;
}

  const {card, plan, rate, cashback, lvData} = r;

  // Build notes

  // Level condition hint

  const region = document.getElementById('regionSel') ? document.getElementById('regionSel').value : 'domestic';
  const regionLabel = region === 'japan' ? '日本' : region === 'west' ? '歐美 / 其他海外' : '國內';

  return `<div class="rc${isBest?' best':''}">
    <div class="rc-top">
      <div class="rc-badge ${card.badgeClass}">${card.badgeText}</div>
      <div class="rc-info">

      </div>

      <div class="stat"><div class="sv blue">${pct(rate)}</div><div class="sl">回饋率</div></div>
      <div class="stat"><div class="sv green">${amount>0?'$'+fmt(cashback):'—'}</div><div class="sl">本次回饋</div></div>
    </div>
    <div class="rc-plan">${region==='domestic' ? (plan ? `需切換方案：<strong>${plan.name}</strong>` : '需切換方案：<strong>一般回饋</strong>') : `出國情境：<strong>${regionLabel}</strong>`}｜升等條件：${escHtml(lvCond)}</div>
    <div class="rc-notes">${notes.map(n=>`<span>${escHtml(n)}</span>`).join('')}</div>
  </div>`;
}

function importData(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const d = JSON.parse(e.target.result);
      DATA = d; save();
      alert('匯入成功！');
      location.reload();
    }catch(err){ alert('JSON 格式錯誤：'+err.message); }
  };
  reader.readAsText(file);
}

function fmt(n){ return Math.round(n).toLocaleString('zh-TW'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
