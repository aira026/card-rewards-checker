<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#01696f" />
  <title>Cube 回饋小工具</title>
  <style>
    :root, [data-theme="light"] { --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem); --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem); --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem); --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem); --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem); --space-2: .5rem; --space-3: .75rem; --space-4: 1rem; --space-5: 1.25rem; --radius-lg: .75rem; --radius-xl: 1rem; --radius-full: 9999px; --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-border: #d4d1ca; --color-text: #28251d; --color-text-muted: #6e6b64; --color-text-faint: #9a978f; --color-text-inverse: #f9f8f4; --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8; --color-success: #437a22; --color-warning: #964219; --color-blue: #006494; --color-pink: #a12c7b; --shadow-md: 0 8px 24px rgba(0,0,0,.08); --font-body: "Inter", "Noto Sans TC", sans-serif; }
    [data-theme="dark"] { --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-border: #393836; --color-text: #e2dfda; --color-text-muted: #a39f97; --color-text-faint: #77736d; --color-text-inverse: #171614; --color-primary: #4f98a3; --color-primary-hover: #68aab4; --color-primary-highlight: #233336; --color-success: #79b55c; --color-warning: #c88054; --color-blue: #6aa8d8; --color-pink: #d163a7; --shadow-md: 0 8px 24px rgba(0,0,0,.28); }
    * { box-sizing: border-box; } body { margin:0; min-height:100dvh; font-family:var(--font-body); font-size:var(--text-base); line-height:1.6; color:var(--color-text); background:linear-gradient(180deg,var(--color-bg),var(--color-surface)); } button, input, select { font:inherit; } .app { max-width:840px; margin:0 auto; padding:var(--space-4); } .topbar { display:flex; justify-content:space-between; align-items:center; gap:var(--space-3); margin-bottom:var(--space-4); } .logo { display:inline-flex; align-items:center; gap:var(--space-3); font-weight:700; } .logo-mark { width:38px; height:38px; border-radius:12px; background:var(--color-primary); color:#fff; display:grid; place-items:center; } .theme-toggle { min-width:44px; min-height:44px; border:1px solid var(--color-border); border-radius:var(--radius-full); background:var(--color-surface-2); color:var(--color-text); } .panel { background:var(--color-surface); border:1px solid color-mix(in srgb, var(--color-text) 12%, transparent); border-radius:var(--radius-xl); box-shadow:var(--shadow-md); padding:var(--space-5); } h1 { margin:0 0 var(--space-2); line-height:1.15; font-size:var(--text-xl); } h2, p { margin:0; } p { color:var(--color-text-muted); } .search-row, .config-row { display:grid; gap:var(--space-3); margin-top:var(--space-4); } .search-row { grid-template-columns:1fr auto; } .config-row { grid-template-columns:1fr 1fr 1fr; } .field, .select, .primary-btn, .ghost-btn, .chip { min-height:48px; border-radius:var(--radius-lg); } .field, .select { border:1px solid var(--color-border); padding:0 var(--space-4); background:var(--color-surface-2); color:var(--color-text); width:100%; } .primary-btn, .ghost-btn, .chip { border:0; cursor:pointer; } .primary-btn { padding:0 var(--space-5); background:var(--color-primary); color:var(--color-text-inverse); font-weight:700; } .ghost-btn { padding:0 var(--space-4); background:transparent; border:1px solid var(--color-border); color:var(--color-text); } .section-title { margin:var(--space-5) 0 var(--space-3); font-size:var(--text-sm); color:var(--color-text-muted); font-weight:700; } .chips { display:flex; flex-wrap:wrap; gap:var(--space-2); } .chip { padding:0 var(--space-4); background:var(--color-primary-highlight); color:var(--color-primary); font-weight:700; } .chip.active, .chip:hover { background:var(--color-primary); color:var(--color-text-inverse); } .chip.secondary { background:color-mix(in srgb, var(--color-blue) 14%, transparent); color:var(--color-blue); } .chip.secondary.active, .chip.secondary:hover { background:var(--color-blue); color:#fff; } .chip.pink { background:color-mix(in srgb, var(--color-pink) 15%, transparent); color:var(--color-pink); } .chip.pink.active, .chip.pink:hover { background:var(--color-pink); color:#fff; } .result { margin-top:var(--space-5); padding:var(--space-4); border-radius:var(--radius-xl); background:var(--color-surface-2); border:1px solid var(--color-border); display:grid; gap:var(--space-3); } .badge { display:inline-flex; width:fit-content; align-items:center; gap:.4rem; padding:.45rem .7rem; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:700; } .badge.good { background:color-mix(in srgb, var(--color-success) 18%, transparent); color:var(--color-success); } .badge.warn { background:color-mix(in srgb, var(--color-warning) 18%, transparent); color:var(--color-warning); } .kv { display:grid; gap:var(--space-2); } .kv-item { display:grid; grid-template-columns:104px 1fr; gap:var(--space-3); align-items:start; font-size:var(--text-sm); } .kv-item strong { color:var(--color-text); } .note { margin-top:var(--space-3); padding-top:var(--space-3); border-top:1px solid var(--color-border); font-size:var(--text-xs); color:var(--color-text-faint); } .footer-actions { margin-top:var(--space-4); display:flex; flex-wrap:wrap; gap:var(--space-2); } @media (max-width:700px){ .config-row{grid-template-columns:1fr;} } @media (max-width:560px){ .search-row{grid-template-columns:1fr;} .kv-item{grid-template-columns:1fr;gap:.15rem;} }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="logo"><div class="logo-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 6.5v11L12 22l8-4.5v-11L12 2Z"></path><path d="M12 22V12"></path><path d="M20 6.5 12 12 4 6.5"></path></svg></div><div><div style="font-size:var(--text-sm); color:var(--color-text-muted);">Level 可切換版</div><div>Cube 回饋小工具</div></div></div>
      <button class="theme-toggle" data-theme-toggle>☾</button>
    </header>
    <section class="panel">
      <div class="section-title">權益等級</div>
      <div class="chips">
        <button class="chip secondary" data-level-btn="1">Level 1</button>
        <button class="chip secondary active" data-level-btn="2">Level 2</button>
        <button class="chip secondary" data-level-btn="3">Level 3</button>
      </div>
      <div class="search-row">
        <input id="searchInput" class="field" type="text" placeholder="輸入店家，例如：IKEA、全家、蝦皮、Agoda" />
        <button class="primary-btn" id="searchBtn">立即查詢</button>
      </div>
      <div class="config-row">
        <input id="amountInput" class="field" type="number" min="0" step="1" placeholder="輸入消費金額，例如 1200" />
        <select id="sceneSelect" class="select"><option value="normal">一般月份</option><option value="birthday">生日月</option><option value="travel">旅行情境</option></select>
        <select id="sortSelect" class="select"><option value="default">常用店排序：預設</option><option value="travel">常用店排序：旅行優先</option><option value="daily">常用店排序：日常優先</option></select>
      </div>
      <div><div class="section-title">你的常用店家</div><div class="chips" id="quickButtons"></div></div>
      <div class="result" id="resultBox"><span class="badge warn">先輸入店家或點常用按鈕</span><h2>還沒有查詢結果</h2><div class="kv"><div class="kv-item"><strong>建議權益</strong><span>查詢後顯示</span></div><div class="kv-item"><strong>等級</strong><span>預設 Level 2</span></div><div class="kv-item"><strong>估算回饋</strong><span>輸入金額後顯示</span></div><div class="kv-item"><strong>備註</strong><span>玩數位、樂饗購、趣旅行會依你選的等級切換試算。</span></div></div></div>
      <div class="footer-actions"><button class="ghost-btn" id="copyBtn">複製目前結果</button></div>
    </section>
  </main>
  <script>
    const rewardRateByLevel={1:{"玩數位":0.02,"樂饗購":0.02,"趣旅行":0.02,"集精選":0.02,"慶生月":0.10},2:{"玩數位":0.03,"樂饗購":0.03,"趣旅行":0.03,"集精選":0.02,"慶生月":0.10},3:{"玩數位":0.033,"樂饗購":0.033,"趣旅行":0.033,"集精選":0.02,"慶生月":0.10}};
    const rewards=[{keys:["ikea"],label:"IKEA",category:"居家 / 購物",plan:"樂饗購",birthdayPlan:"慶生月",note:"IKEA 已補進資料庫；若當期活動異動，仍請以官方公告為準。"},{keys:["全家","familymart"],label:"全家",category:"超商",plan:"玩數位",birthdayPlan:"慶生月",note:"日常通路可先看玩數位。"},{keys:["7-11","seven","統一超商"],label:"7-11",category:"超商",plan:"樂饗購",birthdayPlan:"慶生月",note:"超商回饋常受支付方式影響。"},{keys:["uber eats","ubereats","uber"],label:"Uber Eats",category:"外送",plan:"樂饗購",birthdayPlan:"慶生月",note:"外送與餐飲可優先看樂饗購。"},{keys:["蝦皮","shopee"],label:"蝦皮",category:"網購",plan:"玩數位",birthdayPlan:"慶生月",note:"網購通路通常先看玩數位。"},{keys:["momo"],label:"momo",category:"網購",plan:"玩數位",birthdayPlan:"慶生月",note:"大型電商可先看玩數位。"},{keys:["星巴克","starbucks"],label:"星巴克",category:"餐飲",plan:"樂饗購",birthdayPlan:"慶生月",note:"餐飲與咖啡可先看樂饗購。"},{keys:["新光三越","sks"],label:"新光三越",category:"百貨",plan:"樂饗購",birthdayPlan:"慶生月",note:"百貨通路可與生日月一起比對。"},{keys:["agoda","booking","trip.com","trip"],label:"訂房 / 旅行平台",category:"旅行",plan:"趣旅行",birthdayPlan:"慶生月",note:"訂房與旅行平台通常先看趣旅行。"}];
    const quickOrders={default:["IKEA","全家","7-11","Uber Eats","蝦皮","momo","星巴克","新光三越","Agoda"],travel:["Agoda","IKEA","新光三越","星巴克","全家","7-11","蝦皮","momo","Uber Eats"],daily:["全家","7-11","IKEA","Uber Eats","蝦皮","momo","星巴克","新光三越","Agoda"]};
    const quickButtons=document.getElementById('quickButtons'),input=document.getElementById('searchInput'),amountInput=document.getElementById('amountInput'),sceneSelect=document.getElementById('sceneSelect'),sortSelect=document.getElementById('sortSelect'),resultBox=document.getElementById('resultBox');
    let currentResult='',currentLevel=2;
    const normalize=t=>t.trim().toLowerCase();
    const money=n=>new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0}).format(n||0);
    const getRate=plan=>(rewardRateByLevel[currentLevel]&&rewardRateByLevel[currentLevel][plan])||0;
    const estimate=(plan,amount)=>Math.round((amount||0)*getRate(plan));
    const findReward=query=>{const q=normalize(query); if(!q) return null; return rewards.find(item=>item.keys.some(k=>q.includes(k.toLowerCase()))||item.label.toLowerCase().includes(q));};
    const resolvePlan=item=>sceneSelect.value==='birthday'&&item.birthdayPlan?item.birthdayPlan:(sceneSelect.value==='travel'&&item.category==='旅行'?'趣旅行':item.plan);
    function renderResult(query){const found=findReward(query),amount=Number(amountInput.value||0),sceneLabel=sceneSelect.options[sceneSelect.selectedIndex].text; if(found){const plan=resolvePlan(found),rate=getRate(plan),cashback=estimate(plan,amount); currentResult=`${found.label}｜Level ${currentLevel}｜情境：${sceneLabel}｜建議權益：${plan}｜金額：${amount?money(amount):'未輸入'}｜估算回饋：${amount?money(cashback):'未輸入'}｜備註：${found.note}`; resultBox.innerHTML=`<span class="badge good">找到建議結果</span><h2>${found.label}</h2><div class="kv"><div class="kv-item"><strong>建議權益</strong><span>${plan}</span></div><div class="kv-item"><strong>等級</strong><span>Level ${currentLevel}</span></div><div class="kv-item"><strong>情境</strong><span>${sceneLabel}</span></div><div class="kv-item"><strong>估算回饋</strong><span>${amount?`${money(amount)} × ${(rate*100).toFixed(rate===0.033?1:0)}% ≈ ${money(cashback)}`:'請先輸入消費金額'}</span></div><div class="kv-item"><strong>備註</strong><span>${found.note}</span></div></div><div class="note">Level 1 為 2%，Level 2 為 3%，Level 3 為 3.3%，適用於玩數位、樂饗購、趣旅行；集精選固定 2%；生日月先以 10% 示意。</div>`;} else {resultBox.innerHTML=`<span class="badge warn">目前找不到</span><h2>${query||'未輸入店家'}</h2><div class="kv"><div class="kv-item"><strong>建議權益</strong><span>尚未建立</span></div><div class="kv-item"><strong>等級</strong><span>Level ${currentLevel}</span></div><div class="kv-item"><strong>估算回饋</strong><span>無法估算</span></div><div class="kv-item"><strong>備註</strong><span>這家店還沒放進你的資料庫。</span></div></div>`;}}
    function runSearch(value){const q=value||input.value; if(!q.trim()) return; input.value=q; renderResult(q); [...quickButtons.querySelectorAll('.chip')].forEach(btn=>btn.classList.toggle('active',btn.dataset.store===q));}
    function renderQuickButtons(){quickButtons.innerHTML=''; quickOrders[sortSelect.value].forEach(name=>{const btn=document.createElement('button'); btn.className=name==='IKEA'?'chip pink':'chip'; btn.type='button'; btn.dataset.store=name; btn.textContent=name; btn.onclick=()=>runSearch(name); quickButtons.appendChild(btn);});}
    renderQuickButtons();
    document.getElementById('searchBtn').onclick=()=>runSearch();
    input.addEventListener('keydown',e=>{if(e.key==='Enter') runSearch();});
    amountInput.addEventListener('input',()=>{if(input.value.trim()) renderResult(input.value);});
    sortSelect.addEventListener('change',renderQuickButtons);
    sceneSelect.addEventListener('change',()=>{if(input.value.trim()) renderResult(input.value);});
    document.querySelectorAll('[data-level-btn]').forEach(btn=>btn.addEventListener('click',()=>{currentLevel=Number(btn.dataset.levelBtn); document.querySelectorAll('[data-level-btn]').forEach(b=>b.classList.toggle('active',b===btn)); if(input.value.trim()) renderResult(input.value);}));
    document.getElementById('copyBtn').onclick=async()=>{if(!currentResult) return alert('先查一個店家再複製'); try{await navigator.clipboard.writeText(currentResult); alert('已複製結果');}catch{alert('複製失敗');}};
    document.querySelector('[data-theme-toggle]').onclick=()=>{const root=document.documentElement; const next=root.getAttribute('data-theme')==='dark'?'light':'dark'; root.setAttribute('data-theme',next); document.querySelector('[data-theme-toggle]').textContent=next==='dark'?'☀':'☾';};
  </script>
</body>
</html>
